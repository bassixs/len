<!-- MODAL: Request Call -->
<div class="modal" id="callModal">
    <div class="modal-overlay" id="callModalOverlay"></div>
    <div class="modal-container reveal">
        <button class="modal-close" id="callModalClose"><i class="fas fa-times"></i></button>
        <h3 class="modal-title">Заказать звонок</h3>
        <p class="modal-desc">Оставьте свои данные, и мы перезвоним вам в течение 15 минут.</p>
        <form class="modal-form" id="callFormHero">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" class="form-control" required placeholder="Имя">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" class="form-control" required placeholder="+7 (___) ___-__-__">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem; width: 100%; justify-content: center;">Перезвоните мне</button>
        </form>
    </div>
</div>

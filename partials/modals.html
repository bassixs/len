<!-- MODAL: Request Call -->
<div class="modal" id="callModal">
    <div class="modal-overlay" id="callModalOverlay"></div>
    <div class="modal-container reveal">
        <button class="modal-close" id="callModalClose"><i class="fas fa-times"></i></button>
        <h3 class="modal-title">Заказать звонок</h3>
        <p class="modal-desc">Оставьте свои данные, и мы перезвоним вам в течение 15 минут.</p>
        <form class="modal-form" id="callFormHero">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" class="form-control" required placeholder="Имя" />
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" class="form-control" required placeholder="+7 (___) ___-__-__" />
            </div>
            <button
                type="submit"
                class="btn btn-primary btn-block"
                style="margin-top: 1rem; width: 100%; justify-content: center"
            >
                Перезвоните мне
            </button>
        </form>
    </div>
</div>

<!-- ===== MINI-CART DRAWER ===== -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
        <h3 class="cart-drawer-title">Ваша корзина</h3>
        <button class="cart-drawer-close" id="cartDrawerClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-drawer-items" id="cartDrawerItems">
        <!-- Items render here via JS -->
    </div>
    <div class="cart-drawer-hint" id="cartDrawerHint"></div>
    <div class="cart-drawer-footer">
        <div class="cart-drawer-total">
            <span>Итого:</span>
            <span id="cartDrawerTotal">0 ₽</span>
        </div>
        <a href="cart.html" class="btn btn-primary btn-block">В корзину и оформление</a>
    </div>
</div>

<!-- ===== TOAST NOTIFICATION CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

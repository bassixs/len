<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Категория товаров — нжен ЛЁН. Изделия из натурального льна.">
    <title>Категория — нжен ЛЁН</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="stylesheet" href="styles.css?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    {{> header }}

    <div class="ch-ref-header">
        <div class="container">
            <div class="ch-ref-breadcrumbs">
                <a href="index.html">ГЛАВНАЯ СТРАНИЦА</a> / <a href="catalog.html">КАТАЛОГ</a> / <span class="active"
                    id="categoryTitle">ДОМАШНИЙ ТЕКСТИЛЬ</span>
            </div>

            <div class="ch-ref-title-wrap">
                <h1 class="ch-ref-title" id="categoryPageTitle">ЛЬНЯНОЙ ТЕКСТИЛЬ ДЛЯ КУХНИ</h1>
                <span class="ch-ref-count">(34 товара)</span>
            </div>

            <p class="section-subtitle" id="categorySubtitle">
                Скатерти, полотенца, постельное бельё и другие изделия из натурального льна.
            </p>

            <div class="ch-ref-toolbar">
                <div class="ch-ref-subcats" id="categorySubcats">
                    <a href="catalog.html" class="ch-ref-subcat-back"><i class="fas fa-chevron-left"></i> ВСЁ <span></span></a>
                    <!-- Вкладки подкатегорий и счётчики подставляются из category-products.js -->
                </div>

                <div class="ch-ref-filters">
                    <div class="ch-ref-dropdown">
                        ВСЕ ТОВАРЫ <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="ch-ref-dropdown">
                        ЦЕНА <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="ch-ref-dropdown">
                        ЦВЕТ <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="ch-ref-view">
                        ОТОБРАЖЕНИЕ
                        <button class="active" data-view="grid" title="Сетка 3 колонки">3</button>
                        <button data-view="grid4" title="Сетка 4 колонки">4</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <section class="section category-page" style="padding-top: 0;">
        <div class="container">

            <div class="category-filters"></div>

            <div class="category-products-grid" id="categoryGrid">
                <!-- Товары из data/products/{cat}.json через category-products.js -->
            </div>
            <div id="categoryPagination" class="category-pagination"></div>
        </div>
    </section>

    <script type="module" src="/js/main.js"></script>
    {{> footer }}
    {{> modals }}

    <script>
        (async function () {
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('cat') || 'home-textile';

            let categories = {};
            try {
                const dataUrl = new URL('data/categories.json', window.location.href);
                const response = await fetch(dataUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                categories = await response.json();
            } catch (error) {
                console.error('Error fetching categories:', error);
                return;
            }

            const data = categories[cat] || categories['home-textile'];

            // Update page title and meta
            document.title = data.title + ' — нжен ЛЁН';
            const descMeta = document.querySelector('meta[name="description"]');
            if (descMeta) {
                descMeta.content = data.subtitle + ' — нжен ЛЁН';
            }

            // Update breadcrumbs & headings
            const titleEl = document.getElementById('categoryTitle');
            const h1El = document.getElementById('categoryPageTitle');
            const subtitleEl = document.getElementById('categorySubtitle');
            if (titleEl) titleEl.textContent = data.title;
            if (h1El) h1El.textContent = data.title;
            if (subtitleEl) subtitleEl.textContent = data.subtitle;
        })();
    </script>
</body>

</html>
